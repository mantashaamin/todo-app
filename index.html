<!DOCTYPE html>
<html>
<head>
  <title>Productivity Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1 id="greeting">Good Evening 🌙</h1>

  <!-- WEATHER -->
  <div class="weather">

    <div class="search-box">
      <div class="input-wrapper">
        <input type="text" id="cityInput" placeholder="Search city">
        <span id="clearBtn">✖</span>
      </div>

      <button id="searchBtn">Search</button>
    </div>

    <div id="weatherResult">
      <p>Search a city to see weather</p>
    </div>

  </div>

  <!-- TODO -->
  <div class="todo">
    <input type="text" id="taskInput" placeholder="Add a task">
    <button id="addBtn">+</button>

    <ul id="taskList"></ul>

    <div class="controls">
      <button id="allBtn">All</button>
      <button id="activeBtn">Active</button>
      <button id="completedBtn">Completed</button>
    </div>

    <p id="taskCounter">No tasks yet</p>
    <button id="clearCompleted">Clear Completed</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
